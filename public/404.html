<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <script>
    // Get the current path and redirect to the main page with the path
    const path = window.location.pathname;
    const repoName = '/Prime-Nova';
    
    // Remove the repo name from the path if it exists
    const cleanPath = path.startsWith(repoName) 
      ? path.substring(repoName.length)
      : path;
    
    // Redirect to the main page with the path
    window.location.href = `${repoName}/${cleanPath}`;
  </script>
  <meta http-equiv="refresh" content="0;url=/Prime-Nova/" />
</head>
<body>
  <p>Redirecting to Prime Nova...</p>
  <p>If you are not redirected, <a href="/Prime-Nova/">click here</a>.</p>
</body>
</html>

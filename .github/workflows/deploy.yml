name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REPO_NAME: Prime-Nova
  NODE_VERSION: '20.x'
  TARGET_BRANCH: gh-pages
  BUILD_DIR: out

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Build the project
          echo "Building for production..."
          npm run build
          
          # Export to static files
          echo "Exporting static files..."
          npm run export
          
          # Create required files for GitHub Pages
          echo "Configuring for GitHub Pages..."
          touch $BUILD_DIR/.nojekyll
          
          # Create a proper 404.html that handles client-side routing
          cat > $BUILD_DIR/404.html << 'EOL'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Page Not Found</title>
              <script>
                // Single Page Apps for GitHub Pages
                (function() {
                  var redirect = sessionStorage.redirect;
                  delete sessionStorage.redirect;
                  if (redirect && redirect !== window.location.href) {
                    history.replaceState(null, null, redirect);
                  } else {
                    var path = window.location.pathname;
                    if (path.endsWith('/')) {
                      path = path.slice(0, -1);
                    }
                    if (path.endsWith('.html')) {
                      window.location.href = path;
                    } else {
                      window.location.href = '/';
                    }
                  }
                })();
              </script>
              <meta http-equiv="refresh" content="0; url=/" />
            </head>
            <body>
              <p>Redirecting to home page...</p>
              <p>If you are not redirected, <a href="/">click here</a>.</p>
            </body>
          </html>
          EOL
          
          # Create a simple index.html that redirects to the main page
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Prime Nova</title><script>window.location.href="/";</script><meta http-equiv="refresh" content="0; url=/" /></head><body>Redirecting to Prime Nova...</body></html>' > $BUILD_DIR/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ env.BUILD_DIR }}
          branch: ${{ env.TARGET_BRANCH }}
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME
            _next/
            404.html
          commit-message: "Deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          force: true

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          touch out/.nojekyll
          
          # Create a proper 404.html for GitHub Pages
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Page Not Found</title><script>window.location.replace("/Prime-Nova/" + window.location.pathname.split("/").slice(2).join("/"));</script></head><body>Redirecting to Prime Nova...</body></html>' > out/404.html
          
          # Copy CNAME if it exists
          if [ -f CNAME ]; then
            cp CNAME out/
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME
          commit-message: "Deploy to GitHub Pages"
          force: true

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          npm run export
          touch out/.nojekyll
          # Create a simple index.html that redirects to the actual site
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./out" /></head><body>Redirecting to <a href="./out">Prime Nova</a>...</body></html>' > index.html
          mv index.html out/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME
          commit-message: "Deploy to GitHub Pages"
          force: true

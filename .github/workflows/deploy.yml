name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REPO_NAME: Prime-Nova
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Set environment variable for production build
          echo "NEXT_PUBLIC_BASE_PATH=/$REPO_NAME" >> .env.production
          
          # Build the project
          npm run build
          
          # Create required files for GitHub Pages
          touch out/.nojekyll
          
          # Create a proper 404.html that redirects to the main page
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Page Not Found</title><script>window.location.href="/$REPO_NAME/" + (window.location.pathname.split("$REPO_NAME/")[1] || "");</script><meta http-equiv="refresh" content="0; url=/$REPO_NAME/" /></head><body>Redirecting to Prime Nova...</body></html>' > out/404.html
          
          # Create a simple index.html that redirects to the main page
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Prime Nova</title><script>window.location.href="/$REPO_NAME/";</script><meta http-equiv="refresh" content="0; url=/$REPO_NAME/" /></head><body>Redirecting to Prime Nova...</body></html>' > out/index.html
          
          # Copy CNAME if it exists
          if [ -f CNAME ]; then
            cp CNAME out/
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME
            _next/
          commit-message: "Deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          force: true
